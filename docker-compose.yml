# Local development — PostgreSQL only.
# Milvus and Neo4j run on the cluster (VPN required).

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: legal_rag
      POSTGRES_USER: legal_rag
      POSTGRES_PASSWORD: legal_rag_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
