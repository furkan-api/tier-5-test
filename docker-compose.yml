# Neo4j + GraphRAG Development Stack
# Usage: docker compose up -d

services:
  neo4j:
    image: neo4j:5.26-community
    container_name: graphrag-neo4j
    ports:
      - "7474:7474"   # HTTP (Browser)
      - "7687:7687"   # Bolt (Driver)
    environment:
      NEO4J_AUTH: neo4j/graphrag_password
      NEO4J_PLUGINS: '["apoc"]'
      # Memory settings — adjust for your dataset size
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 2g
      NEO4J_server_memory_pagecache_size: 1g
      # Enable vector index (Neo4j 5.11+)
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "neo4j status || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Optional: GraphRAG API server
  # Uncomment to run the API as a container
  #
  # graphrag-api:
  #   build: .
  #   container_name: graphrag-api
  #   ports:
  #     - "8000:8000"
  #   environment:
  #     NEO4J_URI: bolt://neo4j:7687
  #     NEO4J_USER: neo4j
  #     NEO4J_PASSWORD: graphrag_password
  #   depends_on:
  #     neo4j:
  #       condition: service_healthy

volumes:
  neo4j_data:
  neo4j_logs:
